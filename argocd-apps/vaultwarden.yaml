apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git.onlionel.com/lionel/k3s_gitops.git
    targetRevision: main
    path: apps/vaultwarden
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  syncPolicy:
    syncOptions:
      - CreateNamespace=true