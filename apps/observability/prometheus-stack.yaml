apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      releaseName: prometheus-stack
      values: |
        grafana:
          enabled: true
          persistence:
            enabled: true
            storageClassName: longhorn-2rep
            size: 10Gi
          adminPassword: "CHANGE_ME"
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - grafana.example.local

        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn-2rep
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 30Gi

        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn-2rep
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
