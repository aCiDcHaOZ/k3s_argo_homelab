apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "*"
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false

          commonConfig:
            replication_factor: 1

          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          storage:
            type: filesystem

        singleBinary:
          replicas: 1

          persistence:
            enabled: true
            storageClass: longhorn-2rep
            size: 30Gi

        backend:
          replicas: 0

        read:
          replicas: 0

        write:
          replicas: 0

        ingester:
          replicas: 0

        querier:
          replicas: 0

        queryFrontend:
          replicas: 0

        queryScheduler:
          replicas: 0

        distributor:
          replicas: 0

        compactor:
          replicas: 0

        indexGateway:
          replicas: 0

        bloomCompactor:
          replicas: 0

        bloomGateway:
          replicas: 0

        gateway:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
