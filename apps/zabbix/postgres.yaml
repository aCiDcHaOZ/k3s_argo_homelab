apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zabbix-postgres
  namespace: zabbix
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-2rep
  resources:
    requests:
      storage: 30Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-postgres
  namespace: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-postgres
  template:
    metadata:
      labels:
        app: zabbix-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: zabbix-secrets
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - zabbix
                - -d
                - zabbix
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - zabbix
                - -d
                - zabbix
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zabbix-postgres

---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-postgres
  namespace: zabbix
spec:
  selector:
    app: zabbix-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432