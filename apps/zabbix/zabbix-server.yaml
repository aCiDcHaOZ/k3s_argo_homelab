apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-server
  namespace: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-server
  template:
    metadata:
      labels:
        app: zabbix-server
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zabbix-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: zabbix-secrets
                  key: POSTGRES_DB
          command:
            - sh
            - -c
            - |
              until pg_isready -h zabbix-postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for postgres..."
                sleep 3
              done

      containers:
        - name: zabbix-server
          image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
          ports:
            - containerPort: 10051
          env:
            - name: DB_SERVER_HOST
              value: zabbix-postgres

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zabbix-secrets
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-secrets
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: zabbix-secrets
                  key: POSTGRES_DB
          readinessProbe:
            tcpSocket:
              port: 10051
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 10051
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-server
  namespace: zabbix
spec:
  selector:
    app: zabbix-server
  ports:
    - name: zabbix
      port: 10051
      targetPort: 10051