apiVersion: apps/v1
kind: Deployment
metadata:
  name: semaphore
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: semaphore
  template:
    metadata:
      labels:
        app: semaphore
    spec:
      {{- if .Values.security.enabled }}
      securityContext:
        fsGroup: {{ .Values.security.fsGroup }}
      {{- end }}

      {{- if .Values.security.fixPermissions }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - chown -R {{ .Values.security.runAsUser }}:{{ .Values.security.runAsGroup }} /var/lib/semaphore /etc/semaphore
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: semaphore-data
              mountPath: /var/lib/semaphore
            - name: semaphore-config
              mountPath: /etc/semaphore
      {{- end }}

      containers:
        - name: semaphore
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          {{- if .Values.security.enabled }}
          securityContext:
            runAsUser: {{ .Values.security.runAsUser }}
            runAsGroup: {{ .Values.security.runAsGroup }}
          {{- end }}

          ports:
            - name: http
              containerPort: 3000

          env:
            - name: SEMAPHORE_DB_DIALECT
              value: {{ .Values.semaphore.dbDialect | quote }}
            - name: SEMAPHORE_PORT
              value: "3000"
            - name: SEMAPHORE_PLAYBOOK_PATH
              value: "/tmp/semaphore"
            - name: SEMAPHORE_PUBLIC_URL
              value: {{ .Values.semaphore.publicUrl | quote }}

          envFrom:
            - secretRef:
                name: semaphore-secret

          volumeMounts:
            - name: semaphore-data
              mountPath: /var/lib/semaphore
            - name: semaphore-config
              mountPath: /etc/semaphore

      volumes:
        - name: semaphore-data
          persistentVolumeClaim:
            claimName: semaphore-data
        - name: semaphore-config
          emptyDir: {}