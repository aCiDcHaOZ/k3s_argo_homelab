apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: rev-proxy
spec:
  ports:
    - name: http
      port: 8096
      targetPort: 8096

---
apiVersion: v1
kind: Endpoints
metadata:
  name: jellyfin
  namespace: rev-proxy
subsets:
  - addresses:
      - ip: 10.0.2.2
    ports:
      - name: http
        port: 8096

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: rev-proxy
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
spec:
  ingressClassName: traefik
  rules:
    - host: jellyfin.onlionel.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096
  tls:
    - hosts:
        - jellyfin.onlionel.com